# # ----------------- Copied from particle template -----------------
# Site settings
title: "Niu Liu (刘牛)"
hometitle: "Niu Liu (刘牛)"
description: "My personal website"
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://liuniu.fun" 

# User settings
username: "Niu Liu"
user_description: |
  My research focuses on high-precision astrometry, with particular
  interest in measuring celestial positions at the microarcsecond level
  and constructing a unified multi-frequency celestial reference frame.
user_title: "Researcher in Astronomy"
avatar: "bio.png"

# Google-analytics
google-analytics:
  id: "G-KKSL7XM2F6"

# exclude: ['package.json', 'src' , 'node_modules']

# ----------------- Copied from academicpages template -----------------
# Site Author
author:
  name             : "Niu Liu"
  avatar           : "bio.png"
  location         : "Nanjing, China"
  city             : "Nanjing"
  employer         : "Nanjing University"
  employer_url     : "https://astronomy.nju.edu.cn/EN/index.html"
  email            : ""
  researchgate     : "https://www.researchgate.net/profile/Niu-Liu?ev=hdr_xprf"
  orcid            : "0000-0003-2778-002X"
  adslib           : "https://ui.adsabs.harvard.edu/user/libraries/EWTz-0tVSn6LqIz7ZgLMgg"
# locale                   : "en-US"
encoding: "utf-8"
title_separator          : "-"
teaser                   :  # filename of teaser fallback teaser image placed in /images/, .e.g. "500x300.png"
breadcrumbs              : false # true, false (default)
future                   : true
atom_feed:
  path                   : # blank (default) uses feed.xml
github_username: "Niu-Liu"


# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
    
# Main Navigation
main_navigation:
  - title: "Publications"
    url: /publications/

  - title: "Projects"
    url: /projects/

  - title: "Talks"
    url: /talks/

  - title: "Teaching"
    url: /teaching/

  - title: "CV"
    url: /cv/

  - title: "Blog"
    url: /blogs/


# Defaults
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: archive
      author_profile: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - README.md
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn

# ----------------- Copied from lemonchann template -----------------
blogdescription: "Knowledge is for sharing."
blogname: "Niu Liu's Blog"

# 你的favicon（出现在浏览器tab上）图片URL，建议使用较小(64px × 64px)的图片
# favicon: https://raw.githubusercontent.com/Niu-Liu/Niu-Liu.github.io/master/assets/img/Headshot.ico
favicon: /assets/img/Headshot.ico

# Tabs in header. There are 'Blog', 'About', 'Archive', 'Tags'
# and URL Link(e.g. 'Theme' tab below) tabs. If you don't need one, just delete
# it from the list(Delete '- name: ' and 'url: ', too!)
blog_navigation:
  - name: 首页
    url: /
  - name: 博客
    url: /blogs
  - name: 归档
    url: /archive
  - name: 标签
    url: /tags

# Pagination
paginate: 8
timezone: Asia/Shanghai # http://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Text under the icons in footer
footer-text: "© 2026 Niu Liu"
permalink: /:title/
paginate_path: /blogs/page:num/
 
theme: jekyll-theme-minimal

markdown_ext: "markdown,mkdown,mkdn,mkd,md"
  
# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
  
words_per_minute: 160
excerpt_separator: "<!-- more -->"
incremental: false
  
# Markdown Processing
kramdown:
    input: GFM
    hard_wrap: false
    auto_ids: true
    footnote_nr: 1
    entity_output: as_char
    toc_levels: 1..6
    smart_quotes: lsquo,rsquo,ldquo,rdquo
    enable_coderay: false
    syntax_highlighter: rouge
    syntax_highlighter_opts:
      # Use existing pygments syntax highlighting css
      css_class: 'highlight'